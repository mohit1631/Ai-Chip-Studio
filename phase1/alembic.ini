[alembic]
script_location = migrations
prepend_sys_path = .

# sqlalchemy.url is intentionally NOT set here -- migrations/env.py reads it
# from app.config.settings.database_url instead, so the same AICHIP_DATABASE_URL
# env var drives both the app and migrations. Don't duplicate it here.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# Local dev infra only -- Redis (background jobs) + MinIO (S3-compatible
# storage, optional). The app and worker still run with `uvicorn` /
# `celery` directly (not containerized here) so editing code doesn't
# require a rebuild; this just gives them something real to talk to.
#
# Usage:
#   docker compose up -d
#   # then, in separate terminals:
#   uvicorn app.main:app --reload
#   celery -A app.celery_app worker --loglevel=info
#
# To actually use MinIO instead of local-filesystem storage, set:
#   AICHIP_STORAGE_BACKEND=s3
#   AICHIP_S3_ENDPOINT_URL=http://localhost:9000
#   AICHIP_S3_ACCESS_KEY=minioadmin
#   AICHIP_S3_SECRET_KEY=minioadmin
# and create the bucket once via the MinIO console at http://localhost:9001

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - minio_data:/data

volumes:
  minio_data:

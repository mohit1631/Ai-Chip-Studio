<!-- templates/_base_style.html  — included by every page -->
<style>
  :root {
    --bg:      #0d1117;
    --panel:   #161b22;
    --border:  #30363d;
    --text:    #c9d1d9;
    --muted:   #8b949e;
    --accent:  #58a6ff;
    --good:    #3fb950;
    --bad:     #f85149;
    --warn:    #d29922;
    --mono:    "SF Mono","Consolas","Liberation Mono",monospace;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    margin: 0;
    padding: 2.5rem 1.5rem;
    line-height: 1.6;
  }
  .wrap { max-width: 700px; margin: 0 auto; }
  h1 { font-size: 1rem; letter-spacing:.05em; text-transform:uppercase; color:var(--muted); margin:0 0 .2rem; }
  h2 { font-size: 1.5rem; margin: 0 0 1.5rem; color:var(--text); }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:6px; padding:1.5rem; margin-bottom:1.2rem; }
  label  { display:block; font-size:.83rem; color:var(--muted); margin-bottom:.35rem; }
  input[type="file"], input[type="text"], select {
    width:100%; background:#0d1117; border:1px solid var(--border); color:var(--text);
    padding:.6rem; border-radius:4px; font-family:var(--mono); font-size:.9rem; margin-bottom:1.1rem;
  }
  input[type="file"]::file-selector-button {
    background:var(--border); color:var(--text); border:none; padding:.4rem .8rem;
    border-radius:4px; margin-right:.75rem; cursor:pointer; font-family:var(--mono);
  }
  select { cursor: pointer; }
  button, .btn {
    display:inline-block; background:var(--accent); color:#0d1117; border:none;
    padding:.65rem 1.4rem; border-radius:4px; font-family:var(--mono); font-weight:600;
    font-size:.9rem; cursor:pointer; text-decoration:none;
  }
  button:hover, .btn:hover { opacity:.88; }
  .btn-ghost { background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-ghost:hover { border-color:var(--text); color:var(--text); }
  .hint  { font-size:.77rem; color:var(--muted); margin-top:-.85rem; margin-bottom:1.1rem; }
  .flash { background:#2d1a1a; border:1px solid #5c2626; color:#ff9b9b;
           padding:.75rem 1rem; border-radius:4px; margin-bottom:1.2rem; font-size:.85rem; }
  .row   { display:flex; justify-content:space-between; padding:.3rem 0; font-size:.9rem; }
  .row .k { color:var(--muted); }
  .files { list-style:none; padding:0; margin:0; }
  .files li { padding:.4rem 0; border-bottom:1px solid var(--border); }
  .files li:last-child { border-bottom:none; }
  .files a { color:var(--good); text-decoration:none; }
  .files a:hover { text-decoration:underline; }
  .back  { display:inline-block; margin-top:1rem; color:var(--muted); text-decoration:none; font-size:.85rem; }
  .back:hover { color:var(--text); }
  nav { display:flex; gap:.75rem; margin-bottom:2rem; flex-wrap:wrap; }
  nav a { color:var(--muted); text-decoration:none; font-size:.82rem; padding:.3rem .6rem;
          border:1px solid var(--border); border-radius:4px; }
  nav a:hover, nav a.active { color:var(--accent); border-color:var(--accent); }
  .badge-ok   { color:var(--good); }
  .badge-fail { color:var(--bad); }
  table { width:100%; border-collapse:collapse; font-size:.88rem; }
  th, td { padding:.5rem .75rem; border-bottom:1px solid var(--border); text-align:left; }
  th { color:var(--muted); font-weight:normal; }
  tr:last-child td { border-bottom:none; }
</style>
